<p-toast />
<div class="centered-title">
    <h2>
        <span style="color: rgb(50, 134, 57)">FACULTAD </span>
        <span style="color: rgb(15, 15, 15)">PROGRAMA</span>
    </h2>
</div>
<!--Tabla confiltro-->
<p-card>
    <div class="grid">
        <div class="flex col-offset-1 sm:col-3 md:col-2 xl:col-1">
            <p-button pRipple severity="success" label="Crear" icon="pi pi-plus" (click)="abrirCrearModal()"
                pTooltip="Abrir modal para crear un espacio académico y programa" />
        </div>
        <div class="sm:col-offset-3 sm:col-4 md:col-offset-4 md:col-4 xl:col-offset-7 xl:col-2">
            <p-iconField iconPosition="right">
                <p-inputIcon styleClass="pi pi-search" />
                <input type="text" pInputText placeholder="Search" (input)="
            tablaEspacioProgramaLista.filterGlobal($any($event.target)!.value, 'contains')
          " placeholder="Filtrar" [style]="{ width: '100%' }" />
            </p-iconField>
        </div>
    </div>
    <div class="grid">
        <div class="col-offset-1 col-10">
            <p-table [value]="listaEspacioPrograma" #tablaEspacioProgramaLista [tableStyle]="{ 'min-width': '50rem' }"
                [paginator]="true" [rows]="5" [globalFilterFields]="['nombreFacultad', 'nombrePrograma']"
                [rowsPerPageOptions]="[5, 10]">
                <ng-template pTemplate="header" let-columns>
                    <tr>
                        <th pSortableColumn="EspacioAcademico">Espacio académico <p-sortIcon field="EspacioAcademico"></p-sortIcon></th>
                        <th pSortableColumn="Programa">Programa <p-sortIcon field="Programa"></p-sortIcon></th>
                        <th>Acciones</th>
                      
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-espacioPrograma>
                    <tr>
                        <td>{{ espacioPrograma.facultad.nombreFacultad }}</td>
                        <td>{{ espacioPrograma.programa.nombre }}</td>
                        <td>
                            &nbsp;
                            <p-button (onClick)="eliminar(espacioPrograma)" icon="pi pi-trash" styleClass="button-form"
                              pTooltip="Abrir modal para editar la facultad seleccionado"></p-button>
                          </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</p-card>
