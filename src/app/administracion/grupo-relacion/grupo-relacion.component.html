<p-toast />
<div class="centered-title">
    <h2>
        <span style="color: rgb(50, 134, 57)">GRUPOS </span>
        <span style="color: rgb(15, 15, 15)">RELACIONES</span>
    </h2>
</div>
<!--Tabla confiltro-->
<p-card>
    <div class="grid">
        <div class="flex col-offset-1 sm:col-3 md:col-2 xl:col-1">
            <p-button pRipple severity="success" label="Crear" icon="pi pi-plus" (click)="abrirCrearModal()"
                pTooltip="Abrir modal para crear un grupo relacion" />
        </div>
        <div class="sm:col-offset-3 sm:col-4 md:col-offset-4 md:col-4 xl:col-offset-7 xl:col-2">
            <p-iconField iconPosition="right">
                <p-inputIcon styleClass="pi pi-search" />
                <input type="text" pInputText placeholder="Search" (input)="
            tablaGruposRelacion.filterGlobal($any($event.target)!.value, 'contains')
          " placeholder="Filtrar" [style]="{ width: '100%' }" />
            </p-iconField>
        </div>
    </div>
    <div class="grid">
        <div class="col-offset-1 col-10">
            <p-table [value]="listGruposRelacion" #tablaGruposRelacion [tableStyle]="{ 'min-width': '50rem' }"
                [paginator]="true" [rows]="5" [globalFilterFields]="['grupo', 'sede', 'espacio', 'facultad']"
                [rowsPerPageOptions]="[5, 10]">
                <ng-template pTemplate="header" let-columns>
                    <tr>
                        <th pSortableColumn="grupo">Grupos<p-sortIcon field="grupo"></p-sortIcon></th>
                        <th pSortableColumn="sede">Sedes <p-sortIcon field="sede"></p-sortIcon></th>
                        <th pSortableColumn="espacio">Espacios Académicos <p-sortIcon field="espacio"></p-sortIcon></th>
                        <th pSortableColumn="facultad">Facultades <p-sortIcon field="facultad"></p-sortIcon></th>
                        <th>Acciones</th>
                    </tr>
                </ng-template>
                    <ng-template pTemplate="body" let-grupoRelacion>
                    <tr>
                        <td>{{ grupoRelacion.grupo.nombreGrupo}}</td>
                        <td>{{ grupoRelacion.sede.nombreSede}}</td>
                        <td>{{ grupoRelacion.espacioAcademico.nombre}}</td>                        
                        <td>{{ grupoRelacion.facultad.nombreFacultad}}</td>
                        <td>
                            &nbsp;
                            <p-button (onClick)="eliminarGrupoRelacion(grupoRelacion)" icon="pi pi-trash" styleClass="button-form"
                              pTooltip="Abrir modal para editar la facultad seleccionado"></p-button>
                          </td>
                    </tr>
                </ng-template> 
            </p-table>
        </div>
    </div>
</p-card>
<!-- Crear grupo relacion-->
<p-dialog header="Agregar grupo relacion" [closable]="false" [modal]="true" [(visible)]="displayCrearGrupo"
    [style]="{ width: '100%', 'max-width': '25rem' }">
    <div [formGroup]="fg!">    

        <div class="grid pb-3">
            <div class="col-4 flex align-items-center">
                <label for="grupo" class="font-semibold w-6rem">Grupo:<span class="text-danger">*</span></label>
            </div>
            <p-dropdown id="grupo" name="grupo" optionLabel="nombreGrupo" [options]="listGrupos"
                (onChange)="GrupoSelecconado($event.value)" formControlName="grupo" optionValue="idGrupo"
                appendTo="body" placeholder="Seleccione" class="flex-grow-1 truncate-text col-6"
                [style]="{widtf:'100%'}" [showClear]="true">
            </p-dropdown>
        </div>
        <div class="grid pb-3">
            <div class="col-4 flex align-items-center">
                <label for="sede" class="font-semibold w-6rem">Sede:<span class="text-danger">*</span></label>
            </div>
            <p-dropdown id="sede" name="sede" optionLabel="nombreSede" [options]="listSedes"
                (onChange)="SedeSelecconado($event.value)" formControlName="sede" optionValue="idSede"
                appendTo="body" placeholder="Seleccione" class="flex-grow-1 truncate-text col-6"
                [style]="{widtf:'100%'}" [showClear]="true">
            </p-dropdown>
        </div>
        <div class="grid pb-3">
            <div class="col-4 flex align-items-center">
                <label for="espacio" class="font-semibold w-6rem">Espacio Académico:<span class="text-danger">*</span></label>
            </div>
            <p-dropdown id="espacio" name="espacio" optionLabel="nombre" [options]="listEspacios"
                (onChange)="EspacioSelecconado($event.value)" formControlName="espacio" optionValue="idEspacioAcademico"
                appendTo="body" placeholder="Seleccione" class="flex-grow-1 truncate-text col-6"
                [style]="{widtf:'100%'}" [showClear]="true">
            </p-dropdown>
        </div>
        <div class="grid pb-3">
            <div class="col-4 flex align-items-center">
                <label for="facultad" class="font-semibold w-6rem">Facultad:<span class="text-danger">*</span></label>
            </div>
            <p-dropdown id="facultad" name="facultad" optionLabel="nombreFacultad" [options]="listFacultades"
                (onChange)="FacultadSelecconado($event.value)" formControlName="facultad" optionValue="idFacultad"
                appendTo="body" placeholder="Seleccione" class="flex-grow-1 truncate-text col-6"
                [style]="{widtf:'100%'}" [showClear]="true">
            </p-dropdown>
        </div>
        <div class="flex justify-content-end gap-2">
            <p-button label="Cancelar" severity="secondary" (click)="cerrarCrearModal()" />
            <p-button label="Crear" (click)="creargrupoRelacion()" />
        </div>
    </div>
</p-dialog>
