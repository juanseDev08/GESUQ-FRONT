<p-toast />
<div class="centered-title">
    <h2>
        <span style="color: rgb(50, 134, 57)">PROGRAMAS</span>
    </h2>
</div>
<!--Tabla confiltro-->
<p-card>
    <div class="grid">
        <div class="flex col-offset-1 sm:col-3 md:col-2 xl:col-1">
            <p-button pRipple severity="success" label="Crear" icon="pi pi-plus" (click)="abrirCrearModal()"
                pTooltip="Abrir modal para crear un programa" />
        </div>
        <div class="sm:col-offset-3 sm:col-4 md:col-offset-4 md:col-4 xl:col-offset-7 xl:col-2">
            <p-iconField iconPosition="right">
                <p-inputIcon styleClass="pi pi-search" />
                <input type="text" pInputText placeholder="Search" (input)="
            tablaProgramaLista.filterGlobal($any($event.target)!.value, 'contains')
          " placeholder="Filtrar" [style]="{ width: '100%' }" />
            </p-iconField>
        </div>
    </div>

    <div class="grid">
        <div class="col-offset-1 col-10">
            <p-table [value]="listPrograma" #tablaProgramaLista [tableStyle]="{ 'min-width': '50rem' }"
                [paginator]="true" [rows]="5" [globalFilterFields]="['nombre']" [rowsPerPageOptions]="[5, 10]">
                <ng-template pTemplate="header" let-columns>
                    <tr>
                        <th pSortableColumn="nombre">Codigo <p-sortIcon field="nombre"></p-sortIcon></th>
                        <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre"></p-sortIcon></th>
                        <th>Acciones</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-programa>
                    <tr>
                        <td>{{ programa.codPrograma }}</td>
                        <td>{{ programa.nombre }}</td>
                        <td>
                            &nbsp;
                            <p-button (onClick)="abrirEditarModal(programa)" icon="pi pi-pencil"
                                styleClass="button-form"
                                pTooltip="Abrir modal para editar el programa seleccionado"></p-button>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</p-card>
<!-- Crear Programa-->
<p-dialog header="Agregar Programa" [closable]="false" [modal]="true" [(visible)]="displayCrearPrograma"
    [style]="{ width: '100%', 'max-width': '25rem' }">
    <div [formGroup]="fg!">
        <div class="grid pb-3">
            <div class="col-4 flex align-items-center">
                <label for="codPrograma" class="font-semibold w-6rem">Cod. Programa:<span
                        class="text-danger">*</span></label>
            </div>
            <div class="col-8">
                <input pInputText class="flex-grow-1 w-full" id="codPrograma" autocomplete="off"
                    formControlName="codPrograma" pTooltip="Ingrese el nombre del espacio" />
                <br />
                <small class="p-error"
                    *ngIf="fg.get('codPrograma')?.errors?.['required'] && (fg.get('codPrograma')?.dirty || fg.get('codPrograma')?.touched)">El
                    codigo del programa es obligatorio</small>
            </div>
            <div class="col-4 flex align-items-center">
                <label for="nombre" class="font-semibold w-6rem">Nombre:<span class="text-danger">*</span></label>
            </div>
            <div class="col-8">
                <input pInputText class="flex-grow-1 w-full" id="nombre" autocomplete="off" formControlName="nombre"
                    pTooltip="Ingrese el nombre del espacio" />
                <br />
                <small class="p-error"
                    *ngIf="fg.get('nombre')?.errors?.['required'] && (fg.get('nombre')?.dirty || fg.get('nombre')?.touched)">El
                    nombre es obligatorio</small>
            </div>
        </div>
        <div class="flex justify-content-end gap-2">
            <p-button label="Cancelar" severity="secondary" (click)="cerrarCrearModal()" />
            <p-button label="Crear" (click)="crearPrograma()" />
        </div>
    </div>
</p-dialog>

<!-- Editar Programa-->
<p-dialog header="Editar Programa" [closable]="false" [modal]="true" [(visible)]="displayEditarPrograma"
    [style]="{width: '100%', 'max-width': '25rem'  }">
    <div [formGroup]="fg!">
        <div class="grid pb-3">
            <div class="col-4 flex align-items-center">
                <label for="codPrograma" class="font-semibold w-6rem">Cod. Programa:<span
                        class="text-danger">*</span></label>
            </div>
            <div class="col-8">
                <input pInputText class="flex-grow-1 w-full" id="codPrograma" autocomplete="off"
                    formControlName="codPrograma" pTooltip="Ingrese el nombre del espacio" />
                <br />
                <small class="p-error"
                    *ngIf="fg.get('codPrograma')?.errors?.['required'] && (fg.get('codPrograma')?.dirty || fg.get('codPrograma')?.touched)">El
                    codigo del programa es obligatorio</small>
            </div>
            <div class="col-4 flex align-items-center">
                <label for="nombre" class="font-semibold w-6rem">Nombre:<span class="text-danger">*</span></label>
            </div>
            <div class="col-8">
                <input pInputText class="flex-grow-1 w-full" id="nombre" autocomplete="off" formControlName="nombre"
                    pTooltip="Ingrese el nombre del espacio" />
                <br />
                <small class="p-error"
                    *ngIf="fg.get('nombre')?.errors?.['required'] && (fg.get('nombre')?.dirty || fg.get('nombre')?.touched)">El
                    nombre es obligatorio</small>
            </div>
        </div>
        <div class="flex justify-content-end gap-2">
            <p-button label="Cancelar" severity="secondary" (click)="cerrarEditarModal()" />
            <p-button label="Editar" (click)="editarPrograma()" />
        </div>
    </div>
</p-dialog>
