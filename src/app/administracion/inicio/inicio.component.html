<div class="grid">
  <div class="col-offset-2 col-8">
    <p-dropdown [options]="listEspacioAcademico" [(ngModel)]="espacioAcademicoSeleccionado" optionLabel="nombre"
      placeholder="Selecciona el aula" class=" flex-grow-1" [style]="{ width: '100%' }"
      (onChange)="asignarEspacioAcademico($event.value)" showClear="true">
    </p-dropdown>
  </div>
  <app-tabla [espacioAcademicoSeleccionado]="espacioAcademicoSeleccionado"></app-tabla>
