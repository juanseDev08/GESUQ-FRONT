<div class="grid">
  <div class="col-offset-2 col-8">
    <p-dropdown [options]="listEspacioAcademico" [(ngModel)]="espacioAcademicoSeleccionado" optionLabel="nombre"
      placeholder="Seleccione la sede" class=" flex-grow-1" [style]="{ width: '100%' }"
      (onChange)="asignarEspacioAcademico($event.value)" showClear="true">
    </p-dropdown>
  </div>
  <div class="col-offset-2 col-4">
    <p-dropdown [options]="listEspacioAcademico" [(ngModel)]="espacioAcademicoSeleccionado" optionLabel="nombre"
      placeholder="Seleccione la facultad" class=" flex-grow-1" [style]="{ width: '100%' }"
      (onChange)="asignarEspacioAcademico($event.value)" showClear="true">
    </p-dropdown>
  </div>
  <div class="col-4">
    <p-dropdown [options]="listEspacioAcademico" [(ngModel)]="espacioAcademicoSeleccionado" optionLabel="nombre"
      placeholder="Seleccione el programa" class=" flex-grow-1" [style]="{ width: '100%' }"
      (onChange)="asignarEspacioAcademico($event.value)" showClear="true">
    </p-dropdown>
  </div>
  <div class="col-offset-2 col-4">
    <p-dropdown [options]="listEspacioAcademico" [(ngModel)]="espacioAcademicoSeleccionado" optionLabel="nombre"
      placeholder="Seleccione el espacio académico" class=" flex-grow-1" [style]="{ width: '100%' }"
      (onChange)="asignarEspacioAcademico($event.value)" showClear="true">
    </p-dropdown>
  </div>
  <div class="col-2">
    <p-dropdown [options]="listEspacioAcademico" [(ngModel)]="espacioAcademicoSeleccionado" optionLabel="nombre"
      placeholder="Seleccione el grupo" class=" flex-grow-1" [style]="{ width: '100%' }"
      (onChange)="asignarEspacioAcademico($event.value)" showClear="true">
    </p-dropdown>
  </div>
  <div class="col-2">
    <p-dropdown [options]="listEspacioAcademico" [(ngModel)]="espacioAcademicoSeleccionado" optionLabel="nombre"
      placeholder="Selecciona el semestre" class=" flex-grow-1" [style]="{ width: '100%' }"
      (onChange)="asignarEspacioAcademico($event.value)" showClear="true">
    </p-dropdown>
  </div>
  <div class="col-12 flex justify-content-center">
    <p-button icon="pi pi-calendar" label="Mis Reservas"
      (click)="irAMisReservas()">
    </p-button>
  </div>
  <div class="col-12">
    <app-tabla [espacioAcademicoSeleccionado]="espacioAcademicoSeleccionado" [listaReservas]="listaReservas"
      [disponibilidad]="disponibilidad" (agendarEvento)="listarReservas()"></app-tabla>
  </div>
</div>
