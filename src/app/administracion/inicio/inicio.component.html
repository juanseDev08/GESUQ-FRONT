<div class="grid">
  <div class="col-offset-2 col-8">
    <p-dropdown [options]="espaciosAcademicos" [(ngModel)]="espacioAcademicoSeleccionado" optionLabel="nombre"
      placeholder="Select a City" class=" flex-grow-1" [style]="{ width: '100%' }" (onChange)="asignarEspacioAcademico($event.value)" showClear="true">
    </p-dropdown>
  </div>
  <div class="calendar-container col-12" *ngIf="espacioAcademicoSeleccionado">
    <h2>{{espacioAcademicoSeleccionado.nombre}}</h2>

    <div class="navigation">
      <button pButton class="pi pi-arrow-left" (click)="changeWeek(-1)"></button>
      <button pButton class="pi pi-arrow-right" (click)="changeWeek(1)"></button>
    </div>

    <p-table [value]="listaTiempos" class="col-12">
      <ng-template pTemplate="header">
        <tr>
          <th>Horario</th>
          <th *ngFor="let day of getCurrentWeek()">{{ day.label }}</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-time>
        <tr>
          <td>{{ time }}</td>
          <td *ngFor="let day of getCurrentWeek()" (click)="onCellClick(day.date, time)" class="clickable ">
            <span [ngClass]="{
                'occupied': obtenerDisponibilidad(day.date, time) === 'Ocupado',
                'available': obtenerDisponibilidad(day.date, time) === 'Disponible'
              }">
              {{ obtenerDisponibilidad(day.date, time) || 'Disponible' }}
            </span>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog header="Agendar Aula" [modal]="true" [(visible)]="display" [style]="{ width: '25rem' }">
  <div class="flex align-items-center gap-3 mb-3">
    <label for="username" class="font-semibold w-6rem">Día Seleccionado</label>
    <input pInputText type="text" id="username" class="flex-auto" autocomplete="off" [disabled]="true"
      [(ngModel)]="fechaSeleccionada" />
  </div>
  <div class="flex align-items-center gap-3 mb-5">
    <label for="email" class="font-semibold w-6rem">Email</label>
    <input pInputText id="email" class="flex-auto" autocomplete="off" [disabled]="true" />
  </div>
  <div class="flex justify-content-end gap-2">
    <p-button label="Cancel" severity="secondary" (onClick)="display = false" />
    <p-button label="Save" (onClick)="display = false" />
  </div>
</p-dialog>
